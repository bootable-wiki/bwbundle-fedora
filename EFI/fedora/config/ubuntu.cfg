for isofile in /ubuntu-mini*.iso; do
	if [ -e "$isofile" ]; then
		submenu "$isofile" "$isofile"{
			set isofile="$2"
			set iso_path=$isofile
			loopback loop $isofile
			search --set=root --file /.disk/info
			menuentry "Choose an Ubuntu version to install" {
				set gfxpayload=keep
				linux /casper/vmlinuz iso-chooser-menu ip=dhcp iso-scan/filename=${iso_path} ---
				initrd /casper/initrd
			}

		}
	fi
done
